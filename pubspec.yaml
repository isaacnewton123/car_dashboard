name: car_dashboard
description: "Custom Car Dashboard & Android Head Unit Launcher"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.4

  # Storage
  shared_preferences: ^2.3.5

  # Networking (Gemini API)
  http: ^1.3.0

  # Voice Assistant
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # UI/UX
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  glassmorphism: ^3.0.0
  syncfusion_flutter_gauges: any
  hugeicons: any
  installed_apps: ^2.1.1
  audioplayers: ^6.8.1
  # Bluetooth Classic: custom native platform channel (no library needed)

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Workaround: objective_c >= 9.2.0 uses native asset build hooks that fail
# on Windows when the project or SDK path contains spaces. Pinning to 9.1.0
# (pre-hooks) avoids this. This package is only used on iOS/macOS.
dependency_overrides:
  objective_c: 9.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/img/
    - assets/images/
    - assets/sound/

flutter_launcher_icons:
  android: true
  image_path: "assets/img/sigra.png"
  min_sdk_android: 21
